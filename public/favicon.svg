<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1a1410"/>

  <!-- Sword tilted ~45deg, tip top-right, pommel bottom-left -->
  <g transform="translate(16 16) rotate(-45) scale(1.25) translate(-16 -16)">
    <!-- Blade -->
    <path d="M13.5 19 L13.5 8 L16 2 L18.5 8 L18.5 19 Z" fill="#dce8f4" stroke="#8898a8" stroke-width="0.5"/>
    <!-- Blade center line -->
    <line x1="16" y1="4" x2="16" y2="18.5" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>

    <!-- Crossguard -->
    <path d="M7 19.5 C7 17.8 9 17 11.2 17.9 L16 19.5 L20.8 17.9 C23 17 25 17.8 25 19.5 C25 21.2 23 22 20.8 21.1 L16 19.5 L11.2 21.1 C9 22 7 21.2 7 19.5Z" fill="#d4a84b"/>

    <!-- Ruby -->
    <circle cx="16" cy="19.5" r="2.2" fill="#9b1a1a"/>
    <circle cx="16" cy="19.5" r="1.5" fill="#cc2a2a"/>
    <circle cx="15.3" cy="18.8" r="0.5" fill="rgba(255,180,180,0.6)"/>

    <!-- Grip -->
    <rect x="14.5" y="20.2" width="3" height="4.5" rx="1" fill="#4a2e10"/>
    <rect x="14.2" y="21.2" width="3.6" height="1" rx="0.4" fill="#6a4020"/>
    <rect x="14.2" y="23" width="3.6" height="1" rx="0.4" fill="#6a4020"/>

    <!-- Pommel -->
    <circle cx="16" cy="28" r="2.8" fill="#d4a84b"/>
    <circle cx="16" cy="28" r="1.3" fill="#f0c870"/>
  </g>
</svg>
